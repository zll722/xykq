server:
  port: 8080

spring:
  application:
    name: smart-attendance-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_attendance?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.attendance.domain
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    secret: change-this-to-a-secure-and-long-random-string-for-prod
    expire-hours: 12

app:
  upload:
    base-dir: ../uploads
